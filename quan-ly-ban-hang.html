<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Sổ Bán Hàng</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;600;700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="lib/xlsx.full.min.js" onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';"></script>
<script src="lib/pdf.min.js" onerror="this.onerror=null;this.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';"></script>
<style>
  :root{
    --bg:#FAF6EF;
    --surface:#FFFFFF;
    --ink:#242220;
    --ink-soft:#7A7266;
    --ink-faint:#B3AB9C;
    --primary:#0F6B5C;
    --primary-dark:#0B4F44;
    --primary-tint:#E6F0EC;
    --amber:#C97F1F;
    --amber-tint:#FBF0DE;
    --coral:#C24A3B;
    --coral-tint:#F9E9E5;
    --border:#E6DFCC;
    --border-soft:#EFE9DA;
    --shadow: 0 1px 2px rgba(36,34,32,0.04), 0 8px 24px rgba(36,34,32,0.06);
    --radius: 10px;
    font-family:'Inter',sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);}
  .mono{font-family:'JetBrains Mono',monospace;}
  .app{display:flex;min-height:600px;max-width:1240px;margin:0 auto;background:var(--bg);}

  /* SIDEBAR */
  .sidebar{
    width:208px;flex-shrink:0;background:var(--primary-dark);
    color:#EAF3F0;padding:22px 14px;display:flex;flex-direction:column;gap:4px;
    min-height:100%;
  }
  .brand{display:flex;align-items:center;gap:9px;padding:0 8px 20px 8px;}
  .brand-mark{
    width:30px;height:30px;border-radius:7px;background:#EAF3F0;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .brand-mark svg{width:17px;height:17px;}
  .brand-name{font-family:'Be Vietnam Pro',sans-serif;font-weight:700;font-size:15px;letter-spacing:.1px;color:#fff;}
  .brand-sub{font-size:10.5px;color:#9FC3B9;margin-top:1px;}
  .nav-item{
    display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;
    color:#C9DED9;font-size:13.5px;font-weight:500;cursor:pointer;transition:background .12s, color .12s;
    border:none;background:none;text-align:left;width:100%;font-family:inherit;
  }
  .nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.85;}
  .nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
  .nav-item.active{background:#EAF3F0;color:var(--primary-dark);}
  .nav-item.active svg{opacity:1;}
  .sidebar-foot{margin-top:auto;padding:10px 8px 0 8px;font-size:10.5px;color:#7FA79C;border-top:1px solid rgba(255,255,255,0.08);padding-top:14px;}

  /* MAIN */
  .main{flex:1;min-width:0;padding:26px 30px 40px 30px;}
  .page-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
  .page-title{font-family:'Be Vietnam Pro',sans-serif;font-size:21px;font-weight:700;color:var(--ink);}
  .page-date{font-size:12.5px;color:var(--ink-soft);}
  .btn{
    display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:8px;border:none;
    font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:transform .08s, background .12s;
  }
  .btn:active{transform:scale(0.97);}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:hover{background:var(--primary-dark);}
  .btn-ghost{background:var(--surface);color:var(--ink);border:1px solid var(--border);}
  .btn-ghost:hover{border-color:var(--ink-faint);}
  .btn-coral{background:var(--coral-tint);color:var(--coral);}
  .btn-coral:hover{background:#F3D8D2;}
  .btn-sm{padding:6px 10px;font-size:12px;}
  .btn svg{width:14px;height:14px;}

  /* CARDS */
  .grid-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
  .stat-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
  .stat-label{font-size:11.5px;color:var(--ink-soft);font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
  .stat-value{font-family:'JetBrains Mono',monospace;font-size:21px;font-weight:700;margin-top:6px;color:var(--ink);}
  .stat-value.pos{color:var(--primary);}
  .stat-sub{font-size:11.5px;color:var(--ink-faint);margin-top:3px;}

  .panel{background:var(--surface);border:1px solid var(--border-soft);border-radius:var(--radius);box-shadow:var(--shadow);}
  .panel-head{padding:14px 18px;border-bottom:1px solid var(--border-soft);display:flex;align-items:center;justify-content:space-between;}
  .panel-title{font-family:'Be Vietnam Pro',sans-serif;font-weight:700;font-size:14.5px;}
  .panel-body{padding:16px 18px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-soft);font-weight:600;padding:8px 10px;border-bottom:1px solid var(--border-soft);}
  td{padding:10px 10px;border-bottom:1px solid var(--border-soft);vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:#FBF9F4;}
  .num{font-family:'JetBrains Mono',monospace;text-align:right;}
  .tag{display:inline-block;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:600;}
  .tag-low{background:var(--amber-tint);color:var(--amber);}
  .tag-out{background:var(--coral-tint);color:var(--coral);}
  .tag-ok{background:var(--primary-tint);color:var(--primary);}
  .icon-btn{background:none;border:none;cursor:pointer;padding:5px;border-radius:6px;color:var(--ink-soft);display:inline-flex;}
  .cell-edit{width:100%;border:1px solid transparent;background:transparent;padding:6px 7px;border-radius:6px;font-size:13px;color:var(--ink);}
  .cell-edit:hover{border-color:var(--border);background:#fff;}
  .cell-edit:focus{border-color:var(--primary);background:#fff;outline:none;box-shadow:0 0 0 3px var(--primary-tint);}
  .cell-edit.cell-low{color:var(--amber);font-weight:600;}
  .cell-edit.cell-out{color:var(--coral);font-weight:600;}
  .icon-btn:hover{background:var(--border-soft);color:var(--ink);}
  .icon-btn svg{width:15px;height:15px;}
  .empty-state{padding:40px 20px;text-align:center;color:var(--ink-soft);font-size:13px;}
  .empty-state svg{width:34px;height:34px;color:var(--ink-faint);margin-bottom:10px;}

  input, select, textarea{
    font-family:'Inter',sans-serif;font-size:13px;padding:8px 10px;border-radius:7px;
    border:1px solid var(--border);background:#fff;color:var(--ink);width:100%;
  }
  input:focus, select:focus, textarea:focus{outline:2px solid var(--primary);outline-offset:0;border-color:var(--primary);}
  label{font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;display:block;}
  .field{margin-bottom:12px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  /* MODAL */
  .modal-back{position:fixed;inset:0;background:rgba(36,34,32,0.35);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
  .modal{background:var(--surface);border-radius:12px;width:100%;max-width:420px;box-shadow:0 20px 50px rgba(0,0,0,0.2);max-height:88vh;overflow-y:auto;}
  .modal.wide{max-width:560px;}
  .modal-head{padding:16px 20px;border-bottom:1px solid var(--border-soft);display:flex;justify-content:space-between;align-items:center;}
  .modal-title{font-family:'Be Vietnam Pro',sans-serif;font-weight:700;font-size:15px;}
  .modal-body{padding:18px 20px;}
  .modal-foot{padding:14px 20px;border-top:1px solid var(--border-soft);display:flex;justify-content:flex-end;gap:8px;}
  .modal-x{background:none;border:none;cursor:pointer;color:var(--ink-soft);padding:4px;}

  /* TOAST */
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,0.25);z-index:100;opacity:0;transition:opacity .2s, transform .2s;pointer-events:none;}
  .toast.show{opacity:1;}

  /* SALES / POS LAYOUT */
  .pos-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start;}
  .prod-search{margin-bottom:12px;}
  .prod-list{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:520px;overflow-y:auto;padding-right:2px;}
  .prod-pick{
    border:1px solid var(--border-soft);border-radius:8px;padding:10px 11px;cursor:pointer;background:#fff;
    transition:border-color .1s, background .1s;
  }
  .prod-pick:hover{border-color:var(--primary);background:var(--primary-tint);}
  .prod-pick.disabled{opacity:.4;cursor:not-allowed;}
  .prod-pick.disabled:hover{border-color:var(--border-soft);background:#fff;}
  .prod-pick-name{font-weight:600;font-size:12.5px;margin-bottom:3px;}
  .prod-pick-meta{font-size:11px;color:var(--ink-soft);display:flex;justify-content:space-between;}
  .prod-pick-price{font-family:'JetBrains Mono',monospace;font-weight:600;color:var(--primary);}

  /* RECEIPT - signature element */
  .receipt-wrap{position:sticky;top:20px;}
  .receipt{
    background:#fffdf8;
    border:1px solid var(--border);
    border-radius:6px 6px 0 0;
    padding:20px 20px 16px 20px;
    font-family:'JetBrains Mono',monospace;
    box-shadow:var(--shadow);
    position:relative;
  }
  .receipt-torn{
    height:14px;
    background:
      linear-gradient(-45deg, #fffdf8 8px, transparent 0),
      linear-gradient(45deg, #fffdf8 8px, transparent 0);
    background-size:16px 16px;
    background-repeat:repeat-x;
    margin-top:-1px;
  }
  .receipt-barcode{display:flex;gap:2px;height:26px;margin-bottom:12px;align-items:flex-end;}
  .receipt-barcode div{background:var(--ink);width:2px;}
  .receipt-shop{text-align:center;font-family:'Be Vietnam Pro',sans-serif;font-weight:800;font-size:15px;letter-spacing:.03em;color:var(--ink);}
  .receipt-shop-sub{text-align:center;font-size:10.5px;color:var(--ink-soft);margin-top:2px;margin-bottom:12px;}
  .receipt-dash{border:none;border-top:1px dashed var(--ink-faint);margin:10px 0;}
  .receipt-line{display:flex;justify-content:space-between;font-size:12px;color:var(--ink-soft);margin-bottom:3px;}
  .receipt-items{margin:10px 0;}
  .receipt-item{display:flex;justify-content:space-between;gap:8px;font-size:12px;padding:6px 0;border-bottom:1px dotted var(--border);}
  .receipt-item:last-child{border-bottom:none;}
  .ri-name{flex:1;min-width:0;}
  .ri-name .n{font-weight:600;color:var(--ink);display:block;font-family:'Inter',sans-serif;font-size:12.5px;}
  .ri-name .p{color:var(--ink-faint);font-size:11px;}
  .ri-qty-ctrl{display:flex;align-items:center;gap:4px;margin-top:3px;}
  .ri-qty-ctrl button{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:11px;line-height:1;color:var(--ink-soft);}
  .ri-qty-ctrl button:hover{border-color:var(--primary);color:var(--primary);}
  .ri-sub{font-weight:600;color:var(--ink);align-self:flex-start;}
  .ri-remove{color:var(--coral);cursor:pointer;background:none;border:none;font-size:14px;align-self:flex-start;padding:0 0 0 6px;}
  .receipt-total-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:6px;}
  .receipt-total-label{font-family:'Be Vietnam Pro',sans-serif;font-weight:700;font-size:13px;}
  .receipt-total-value{font-size:19px;font-weight:700;color:var(--primary);}
  .receipt-thanks{text-align:center;font-size:11px;color:var(--ink-faint);margin-top:14px;font-style:italic;}
  .receipt-empty{text-align:center;padding:30px 10px;color:var(--ink-faint);font-size:12px;font-family:'Inter',sans-serif;}
  .receipt-actions{padding:14px 20px 0 20px;display:flex;gap:8px;}
  .receipt-actions .btn{flex:1;justify-content:center;}
  .customer-pick{margin-bottom:10px;}

  /* REPORTS */
  .bar-chart{display:flex;align-items:flex-end;gap:6px;height:160px;padding:10px 4px 0 4px;}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end;}
  .bar{width:100%;background:var(--primary);border-radius:4px 4px 0 0;min-height:2px;transition:height .3s;}
  .bar-label{font-size:9.5px;color:var(--ink-soft);white-space:nowrap;}
  .seg{display:flex;gap:6px;margin-bottom:16px;}
  .seg button{padding:6px 12px;font-size:12px;border-radius:100px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--ink-soft);font-weight:500;}
  .seg button.active{background:var(--primary);color:#fff;border-color:var(--primary);}

  /* IMPORT PDF */
  .dropzone{border:2px dashed var(--border);border-radius:12px;padding:44px 20px;text-align:center;cursor:pointer;transition:border-color .12s,background .12s;background:#fffdf8;}
  .dropzone:hover, .dropzone.drag{border-color:var(--primary);background:var(--primary-tint);}
  .dropzone svg{width:32px;height:32px;color:var(--ink-faint);margin-bottom:10px;}
  .dropzone-title{font-weight:600;font-size:14px;color:var(--ink);}
  .dropzone-sub{font-size:12px;color:var(--ink-soft);margin-top:4px;}
  .step-badges{display:flex;gap:8px;margin-bottom:18px;}
  .step-badge{font-size:11.5px;font-weight:600;padding:5px 12px;border-radius:100px;background:var(--border-soft);color:var(--ink-faint);}
  .step-badge.active{background:var(--primary);color:#fff;}
  .step-badge.done{background:var(--primary-tint);color:var(--primary);}
  .match-badge{font-size:10.5px;font-weight:700;padding:1px 7px;border-radius:100px;margin-left:6px;}
  .match-high{background:var(--primary-tint);color:var(--primary);}
  .match-mid{background:var(--amber-tint);color:var(--amber);}
  .stage-input{padding:6px 8px;font-size:12.5px;}
  .disclaimer{font-size:12px;color:var(--ink-soft);background:var(--amber-tint);border-radius:8px;padding:10px 12px;margin-bottom:16px;line-height:1.5;}

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:var(--ink-faint);border-radius:10px;}

  @media print{
    body *{visibility:hidden;}
    #printReceipt, #printReceipt *{visibility:visible;}
    #printReceipt{position:absolute;top:0;left:0;width:300px;}
  }
  @media (max-width:880px){
    .app{flex-direction:column;}
    .sidebar{width:100%;flex-direction:row;overflow-x:auto;padding:12px;}
    .sidebar-foot{display:none;}
    .brand{display:none;}
    .pos-grid{grid-template-columns:1fr;}
    .grid-stats{grid-template-columns:1fr 1fr;}
    .prod-list{grid-template-columns:1fr;}
  }
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <div class="brand">
      <div class="brand-mark"><svg viewBox="0 0 24 24" fill="none" stroke="#0B4F44" stroke-width="2"><path d="M3 3h2l2.6 12.4a2 2 0 0 0 2 1.6h8.8a2 2 0 0 0 2-1.6L22 8H6"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg></div>
      <div>
        <div class="brand-name">Sổ Bán Hàng</div>
        <div class="brand-sub">Quản lý cửa hàng</div>
      </div>
    </div>
    <button class="nav-item active" data-tab="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>Tổng quan</button>
    <button class="nav-item" data-tab="sales"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>Bán hàng</button>
    <button class="nav-item" data-tab="products"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>Sản phẩm</button>
    <button class="nav-item" data-tab="importpdf"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M12 18v-6M9 15l3-3 3 3"/></svg>Nhập hàng (PDF)</button>
    <button class="nav-item" data-tab="customers"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>Khách hàng</button>
    <button class="nav-item" data-tab="invoices"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16l3-2 3 2 3-2 3 2 3-2V8z"/><path d="M14 2v6h6"/><path d="M8 13h8M8 17h5"/></svg>Hóa đơn</button>
    <button class="nav-item" data-tab="reports"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18 17V9M13 17V5M8 17v-4"/></svg>Báo cáo</button>
    <button class="nav-item" data-tab="backup"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Sao lưu</button>
    <div class="sidebar-foot">Dữ liệu lưu ngay trên trình duyệt này. Nên bấm "Sao lưu" định kỳ để tránh mất dữ liệu.</div>
  </div>

  <div class="main" id="main"></div>
</div>

<div id="modalRoot"></div>
<div class="toast" id="toast"></div>

<script>
/* ---------------- DATA LAYER ---------------- */
let PRODUCTS = [];
let CUSTOMERS = [];
let INVOICES = [];
let LOADED = false;

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const fmt = n => (Number(n)||0).toLocaleString('vi-VN') + '₫';
const todayStr = () => new Date().toLocaleDateString('vi-VN');

function generateSKU(){
  let maxNum = 0;
  PRODUCTS.forEach(p=>{
    const m = /^SP(\d{3,})$/i.exec((p.sku||'').trim());
    if(m){ const n = parseInt(m[1],10); if(n>maxNum) maxNum = n; }
  });
  return 'SP' + String(maxNum+1).padStart(4,'0');
}

const DEFAULT_UNIT = 'cái';
function guessUnitForCategory(category){
  const norm = normalizeVN(category);
  if(!norm) return '';
  const counts = {};
  PRODUCTS.forEach(p=>{
    if(normalizeVN(p.category||'')===norm && p.unit){ counts[p.unit] = (counts[p.unit]||0)+1; }
  });
  let best='', bestC=0;
  Object.entries(counts).forEach(([u,c])=>{ if(c>bestC){ bestC=c; best=u; } });
  return best;
}
function guessUnitForName(name){
  const m = typeof findBestMatch==='function' ? findBestMatch(name) : null;
  if(m && m.score>=0.5 && m.product.unit) return m.product.unit;
  return '';
}

/* Storage abstraction: uses Claude's window.storage when available (in-chat artifact),
   otherwise falls back to the browser's own localStorage so the app works fully
   standalone/offline when opened directly from a downloaded HTML file. */
const LS_PREFIX = 'sobanhang_';
async function storageGet(key){
  if(typeof window.storage !== 'undefined'){
    try{ return await window.storage.get(key); }catch(e){ /* fall through to localStorage */ }
  }
  try{
    const v = localStorage.getItem(LS_PREFIX+key);
    return v!==null ? { key, value: v } : null;
  }catch(e){ return null; }
}
async function storageSet(key, value){
  if(typeof window.storage !== 'undefined'){
    try{ return await window.storage.set(key, value); }catch(e){ /* fall through to localStorage */ }
  }
  try{
    localStorage.setItem(LS_PREFIX+key, value);
    return { key, value };
  }catch(e){ return null; }
}

async function loadAll(){
  try{
    const p = await storageGet('products');
    PRODUCTS = p ? JSON.parse(p.value) : [];
  }catch(e){ PRODUCTS = []; }
  try{
    const c = await storageGet('customers');
    CUSTOMERS = c ? JSON.parse(c.value) : [];
  }catch(e){ CUSTOMERS = []; }
  try{
    const i = await storageGet('invoices');
    INVOICES = i ? JSON.parse(i.value) : [];
  }catch(e){ INVOICES = []; }
  LOADED = true;
}
async function saveProducts(){ try{ await storageSet('products', JSON.stringify(PRODUCTS)); }catch(e){ toast('Lỗi lưu sản phẩm'); } writeLinkedFile(); }

/* ---------------- LINKED LOCAL DATABASE FILE (File System Access API) ---------------- */
let linkedFileHandle = null;
let linkedFileName = null;

function fsApiSupported(){ return typeof window.showSaveFilePicker === 'function' && typeof window.showOpenFilePicker === 'function'; }

function openHandleDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open('sbh_fs_db', 1);
    req.onupgradeneeded = ()=>{ req.result.createObjectStore('handles'); };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
async function idbGetHandle(){
  try{
    const db = await openHandleDB();
    return new Promise(resolve=>{
      const tx = db.transaction('handles','readonly');
      const req = tx.objectStore('handles').get('dbFile');
      req.onsuccess = ()=>resolve(req.result||null);
      req.onerror = ()=>resolve(null);
    });
  }catch(e){ return null; }
}
async function idbSetHandle(handle){
  try{
    const db = await openHandleDB();
    return new Promise(resolve=>{
      const tx = db.transaction('handles','readwrite');
      tx.objectStore('handles').put(handle, 'dbFile');
      tx.oncomplete = ()=>resolve(true);
      tx.onerror = ()=>resolve(false);
    });
  }catch(e){ return false; }
}
async function idbClearHandle(){
  try{
    const db = await openHandleDB();
    return new Promise(resolve=>{
      const tx = db.transaction('handles','readwrite');
      tx.objectStore('handles').delete('dbFile');
      tx.oncomplete = ()=>resolve(true);
      tx.onerror = ()=>resolve(false);
    });
  }catch(e){ return false; }
}
async function writeLinkedFile(){
  if(!linkedFileHandle) return;
  try{
    const writable = await linkedFileHandle.createWritable();
    const payload = JSON.stringify({ products:PRODUCTS, customers:CUSTOMERS, invoices:INVOICES, savedAt:Date.now() }, null, 2);
    await writable.write(payload);
    await writable.close();
  }catch(e){ console.error(e); toast('Không ghi được vào file database cố định'); }
}
async function readLinkedFile(handle){
  const file = await handle.getFile();
  const text = await file.text();
  return JSON.parse(text);
}
async function connectNewDatabase(){
  if(!fsApiSupported()){ toast('Trình duyệt không hỗ trợ tính năng này'); return; }
  try{
    const handle = await window.showSaveFilePicker({
      suggestedName: 'so-ban-hang-database.json',
      types: [{ description:'Database JSON', accept:{'application/json':['.json']} }]
    });
    linkedFileHandle = handle; linkedFileName = handle.name;
    await idbSetHandle(handle);
    await writeLinkedFile();
    toast('Đã tạo và kết nối file database: ' + handle.name);
    if(activeTab==='backup') renderBackup(document.getElementById('main'));
  }catch(e){ if(e.name!=='AbortError'){ console.error(e); toast('Không tạo được file'); } }
}
async function connectExistingDatabase(){
  if(!fsApiSupported()){ toast('Trình duyệt không hỗ trợ tính năng này'); return; }
  try{
    const [handle] = await window.showOpenFilePicker({
      types: [{ description:'Database JSON', accept:{'application/json':['.json']} }], multiple:false
    });
    const data = await readLinkedFile(handle);
    if(!confirm('Nạp dữ liệu từ file này sẽ thay thế toàn bộ dữ liệu hiện tại trên màn hình. Tiếp tục?')) return;
    PRODUCTS = data.products||[]; CUSTOMERS = data.customers||[]; INVOICES = data.invoices||[];
    linkedFileHandle = handle; linkedFileName = handle.name;
    await idbSetHandle(handle);
    cart = [];
    toast('Đã kết nối file database: ' + handle.name);
    if(activeTab==='backup') renderBackup(document.getElementById('main')); else render();
  }catch(e){ if(e.name!=='AbortError'){ console.error(e); toast('Không đọc được file'); } }
}
async function disconnectDatabase(){
  linkedFileHandle = null; linkedFileName = null;
  await idbClearHandle();
  toast('Đã ngắt kết nối file database cố định');
  if(activeTab==='backup') renderBackup(document.getElementById('main'));
}
async function tryResumeLinkedFile(){
  if(!fsApiSupported()) return;
  const handle = await idbGetHandle();
  if(!handle) return;
  try{
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm==='granted'){
      const data = await readLinkedFile(handle);
      PRODUCTS = data.products||[]; CUSTOMERS = data.customers||[]; INVOICES = data.invoices||[];
      linkedFileHandle = handle; linkedFileName = handle.name;
    }else{
      window.__pendingHandle = handle;
    }
  }catch(e){ /* handle may be stale */ }
}
async function resumeLinkedPermission(){
  const handle = window.__pendingHandle;
  if(!handle) return;
  try{
    const perm = await handle.requestPermission({mode:'readwrite'});
    if(perm==='granted'){
      const data = await readLinkedFile(handle);
      PRODUCTS = data.products||[]; CUSTOMERS = data.customers||[]; INVOICES = data.invoices||[];
      linkedFileHandle = handle; linkedFileName = handle.name;
      window.__pendingHandle = null;
      cart = [];
      toast('Đã kết nối lại database: ' + handle.name);
      render();
    }else{
      toast('Bạn chưa cấp quyền truy cập file');
    }
  }catch(e){ console.error(e); toast('Không kết nối lại được'); }
}

function addToCart(productId){
  const p = PRODUCTS.find(x=>x.id===productId);
  if(!p || p.stock<=0) return;
  const existing = cart.find(c=>c.productId===productId);
  const currentQty = existing ? existing.qty : 0;
  if(currentQty+1 > p.stock){ toast('Không đủ tồn kho'); return; }
  if(existing) existing.qty += 1;
  else cart.push({productId, name:p.name, price:p.price, qty:1, unit:p.unit});
  renderReceipt();
}

async function checkout(){
  if(cart.length===0){ toast('Giỏ hàng đang trống'); return; }
  const total = cart.reduce((s,c)=>s+c.price*c.qty,0);
  const invoice = {
    id: uid(),
    code: 'HD' + Date.now().toString().slice(-8),
    date: Date.now(),
    customerId: selectedCustomerId || (CUSTOMERS[0] && CUSTOMERS[0].id) || null,
    items: cart.map(c=>({ productId:c.productId, name:c.name, price:c.price, qty:c.qty, unit:c.unit, subtotal:c.price*c.qty })),
    total
  };
  // reduce stock
  cart.forEach(c=>{
    const p = PRODUCTS.find(x=>x.id===c.productId);
    if(p) p.stock = Math.max(0, p.stock - c.qty);
  });
  INVOICES.unshift(invoice);
  await saveInvoices();
  await saveProducts();
  cart = [];
  renderReceipt();
  toast('Đã tạo hóa đơn ' + invoice.code);
  if(activeTab==='sales') renderSales(document.getElementById('main'));
}

        <button class="icon-btn" data-del="${p.id}" title="Xóa"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
      </td>
    </tr>`;}).join('');
  body.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openProductModal(b.dataset.edit)));
  body.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>deleteProduct(b.dataset.del)));
  wireInlineCellEdits(body);

  const checks = [...body.querySelectorAll('.prod-check')];
  checks.forEach(chk=>{
    chk.addEventListener('click', e=>{
      const idx = Number(chk.dataset.idx);
      const id = chk.dataset.id;
      // shift+click = "quét chọn" range select
      if(e.shiftKey && lastCheckedProdIdx!==null){
        const [from,to] = [lastCheckedProdIdx, idx].sort((a,b)=>a-b);
        for(let i=from;i<=to;i++){
          const c = checks[i];
          if(c){ c.checked = true; selectedProductIds.add(c.dataset.id); }
        }
      }else{
        if(chk.checked) selectedProductIds.add(id); else selectedProductIds.delete(id);
      }
      lastCheckedProdIdx = idx;
      updateBulkBar();
    });
  });
  const selAll = document.getElementById('selectAllProd');
  if(selAll){
    selAll.checked = list.length>0 && list.every(p=>selectedProductIds.has(p.id));
    selAll.addEventListener('change', ()=>{
      if(selAll.checked) list.forEach(p=>selectedProductIds.add(p.id));
      else list.forEach(p=>selectedProductIds.delete(p.id));
      fillProdTable(currentProdFilterQuery());
      updateBulkBar();
    });
  }
  updateBulkBar();
}
function wireInlineCellEdits(body){
  body.querySelectorAll('.cell-edit').forEach(inp=>{
    const commit = async ()=>{
      const id = inp.dataset.id, field = inp.dataset.field;
      const p = PRODUCTS.find(x=>x.id===id);
      if(!p) return;
      if(field==='name'){
        const v = inp.value.trim();
        if(!v){ toast('Tên sản phẩm không được để trống'); inp.value = p.name; return; }
        if(v===p.name) return;
        p.name = v;
      }else if(field==='sku'){
        const v = inp.value.trim();
        if(v===p.sku) return;
        p.sku = v;
      }else if(field==='category'){
        const v = inp.value.trim();
        if(v===p.category) return;
        p.category = v;
      }else if(field==='price'){
        const v = Number(inp.value)||0;
        if(v===p.price) return;
        p.price = v;
      }else if(field==='stock'){
        const v = Number(inp.value)||0;
        if(v===p.stock) return;
        p.stock = v;
      }
      await saveProducts();
      toast('Đã lưu');
      fillProdTable(currentProdFilterQuery());
    };
    inp.addEventListener('change', commit);
    inp.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ e.preventDefault(); inp.blur(); }
    });
  });
}
function updateBulkBar(){
  const bar = document.getElementById('bulkBar');

async function deleteInvoice(id){
  if(!confirm('Xóa hóa đơn này? Tồn kho sẽ được hoàn lại.')) return;
  const inv = INVOICES.find(i=>i.id===id);
  if(inv){
    inv.items.forEach(it=>{
      const p = PRODUCTS.find(x=>x.id===it.productId);
      if(p) p.stock += it.qty;
    });
  }
  INVOICES = INVOICES.filter(i=>i.id!==id);
  await saveInvoices();
  await saveProducts();
  toast('Đã xóa hóa đơn');
  renderInvoicesList(document.getElementById('main'));
}

}
function fillReportBody(){
  const now = Date.now();
  const days = reportRange==='7'?7:reportRange==='30'?30:null;
  const cutoff = days ? now - days*24*3600*1000 : 0;
  const invs = INVOICES.filter(i=>i.date>=cutoff);

  const totalRevenue = invs.reduce((s,i)=>s+i.total,0);
  let totalProfit = 0;
  const salesCount = {};
  invs.forEach(inv=>inv.items.forEach(it=>{
    const p = PRODUCTS.find(pp=>pp.id===it.productId);
    const cost = p ? p.cost : 0;
    totalProfit += (it.price - cost) * it.qty;
    salesCount[it.productId] = (salesCount[it.productId]||0) + it.qty;
    if(!salesCount['_rev_'+it.productId]) salesCount['_rev_'+it.productId]=0;
    salesCount['_rev_'+it.productId] += it.subtotal;
  }));
  const topByRevenue = Object.keys(salesCount).filter(k=>!k.startsWith('_rev_'))
    .map(pid=>({ product: PRODUCTS.find(p=>p.id===pid), qty: salesCount[pid], revenue: salesCount['_rev_'+pid]||0 }))
    .filter(x=>x.product).sort((a,b)=>b.revenue-a.revenue).slice(0,6);

  // bar chart: revenue per day for the range (or last 14 days if 'all')
  const chartDays = days || 14;
  const buckets = [];
  for(let i=chartDays-1;i>=0;i--){
    const d = new Date(now - i*24*3600*1000);
    const label = d.toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});
    const rev = INVOICES.filter(inv=>new Date(inv.date).toDateString()===d.toDateString()).reduce((s,i)=>s+i.total,0);
    buckets.push({label, rev});
  }
  const maxRev = Math.max(...buckets.map(b=>b.rev), 1);

  document.getElementById('reportBody').innerHTML = `
    <div class="grid-stats" style="grid-template-columns:repeat(3,1fr);margin-top:14px;">
      <div class="stat-card"><div class="stat-label">Doanh thu</div><div class="stat-value pos">${fmt(totalRevenue)}</div><div class="stat-sub">${invs.length} hóa đơn</div></div>
      <div class="stat-card"><div class="stat-label">Lợi nhuận ước tính</div><div class="stat-value">${fmt(totalProfit)}</div><div class="stat-sub">Giá bán − giá vốn</div></div>
      <div class="stat-card"><div class="stat-label">Giá trị TB / hóa đơn</div><div class="stat-value">${fmt(invs.length?totalRevenue/invs.length:0)}</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1.3fr 1fr;gap:16px;">
      <div class="panel">
        <div class="panel-head"><div class="panel-title">Doanh thu theo ngày</div></div>
        <div class="panel-body">
          <div class="bar-chart">
            ${buckets.map(b=>`<div class="bar-col"><div class="bar" style="height:${Math.max(4,(b.rev/maxRev)*130)}px" title="${fmt(b.rev)}"></div><div class="bar-label">${b.label}</div></div>`).join('')}
          </div>
        </div>
      </div>
      <div class="panel">
        <div class="panel-head"><div class="panel-title">Bán chạy theo doanh thu</div></div>
        <div class="panel-body">
          ${topByRevenue.length===0 ? `<div class="empty-state">Chưa có dữ liệu.</div>` : `
          <table><thead><tr><th>Sản phẩm</th><th style="text-align:right">Doanh thu</th></tr></thead><tbody>
            ${topByRevenue.map(x=>`<tr><td>${escapeHtml(x.product.name)}</td><td class="num">${fmt(x.revenue)}</td></tr>`).join('')}
          </tbody></table>`}
        </div>
      </div>
    </div>
  `;
}

function exportToExcel(){
  if(typeof XLSX === 'undefined'){ toast('Không tải được thư viện Excel, kiểm tra kết nối mạng'); return; }
  const wb = XLSX.utils.book_new();

  const spRows = PRODUCTS.map(p=>({
    'ID': p.id, 'Tên sản phẩm': p.name, 'Mã SKU': p.sku||'', 'Danh mục': p.category||'',
    'Giá bán': p.price||0, 'Giá vốn': p.cost||0, 'Tồn kho': p.stock||0, 'Đơn vị': p.unit||''
  }));
  const wsSP = XLSX.utils.json_to_sheet(spRows, {header:['ID','Tên sản phẩm','Mã SKU','Danh mục','Giá bán','Giá vốn','Tồn kho','Đơn vị']});
  XLSX.utils.book_append_sheet(wb, wsSP, 'SanPham');

  const khRows = CUSTOMERS.map(c=>({
    'ID': c.id, 'Tên khách hàng': c.name, 'Điện thoại': c.phone||'', 'Địa chỉ': c.address||'', 'Ghi chú': c.note||''
  }));
  const wsKH = XLSX.utils.json_to_sheet(khRows, {header:['ID','Tên khách hàng','Điện thoại','Địa chỉ','Ghi chú']});
  XLSX.utils.book_append_sheet(wb, wsKH, 'KhachHang');

  const hdRows = INVOICES.map(inv=>({
    'ID': inv.id, 'Mã HD': inv.code, 'Ngày': new Date(inv.date).toLocaleString('vi-VN'),
    'ID Khách hàng': inv.customerId||'', 'Tổng tiền': inv.total||0, 'Timestamp': inv.date
  }));
  const wsHD = XLSX.utils.json_to_sheet(hdRows, {header:['ID','Mã HD','Ngày','ID Khách hàng','Tổng tiền','Timestamp']});
  XLSX.utils.book_append_sheet(wb, wsHD, 'HoaDon');

  const ctRows = [];
  INVOICES.forEach(inv=>{
    inv.items.forEach(it=>{
      ctRows.push({
        'ID Hóa đơn': inv.code, 'ID Sản phẩm': it.productId, 'Tên sản phẩm': it.name,
        'Đơn giá': it.price, 'Số lượng': it.qty, 'Thành tiền': it.subtotal
      });
    });

  XLSX.utils.book_append_sheet(wb, wsCT, 'ChiTietHoaDon');

  const fname = `sao-luu-so-ban-hang-${new Date().toISOString().slice(0,10)}.xlsx`;

}

function importFromExcel(file){
  const status = document.getElementById('importStatus');
  if(typeof XLSX === 'undefined'){ toast('Không tải được thư viện Excel, kiểm tra kết nối mạng'); return; }
  const reader = new FileReader();
  reader.onload = async (e)=>{
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array', cellDates:false});
      const need = ['SanPham','KhachHang','HoaDon','ChiTietHoaDon'];
      const missing = need.filter(n=>!wb.SheetNames.includes(n));
      if(missing.length){
        if(status) status.textContent = 'Thiếu sheet: ' + missing.join(', ');
        toast('File không đúng định dạng (thiếu sheet)');
        return;
      }
      if(!confirm('Nạp dữ liệu sẽ THAY THẾ toàn bộ sản phẩm, khách hàng và hóa đơn hiện tại. Tiếp tục?')) return;

      const spRows = XLSX.utils.sheet_to_json(wb.Sheets['SanPham'], {defval:''});
      const khRows = XLSX.utils.sheet_to_json(wb.Sheets['KhachHang'], {defval:''});
      const hdRows = XLSX.utils.sheet_to_json(wb.Sheets['HoaDon'], {defval:''});
      const ctRows = XLSX.utils.sheet_to_json(wb.Sheets['ChiTietHoaDon'], {defval:''});

      const newProducts = spRows.filter(r=>r['Tên sản phẩm']).map(r=>({
        id: String(r['ID']||'').trim() || uid(),
        name: String(r['Tên sản phẩm']||'').trim(),
        sku: String(r['Mã SKU']||'').trim(),
        category: String(r['Danh mục']||'').trim(),
        price: Number(r['Giá bán'])||0,
        cost: Number(r['Giá vốn'])||0,
        stock: Number(r['Tồn kho'])||0,
        unit: String(r['Đơn vị']||'').trim(),
      }));

      const newCustomers = khRows.filter(r=>r['Tên khách hàng']).map(r=>({
        id: String(r['ID']||'').trim() || uid(),
        name: String(r['Tên khách hàng']||'').trim(),
        phone: String(r['Điện thoại']||'').trim(),
        address: String(r['Địa chỉ']||'').trim(),
        note: String(r['Ghi chú']||'').trim(),
        createdAt: Date.now(),
      }));

      // group ChiTietHoaDon by Mã HD (ID Hóa đơn)
      const itemsByCode = {};
      ctRows.forEach(r=>{
        const code = String(r['ID Hóa đơn']||'').trim();
        if(!code) return;
        if(!itemsByCode[code]) itemsByCode[code] = [];
        itemsByCode[code].push({
          productId: String(r['ID Sản phẩm']||'').trim(),
          name: String(r['Tên sản phẩm']||'').trim(),
          price: Number(r['Đơn giá'])||0,
          qty: Number(r['Số lượng'])||0,
          unit: '',
          subtotal: Number(r['Thành tiền']) || (Number(r['Đơn giá'])||0)*(Number(r['Số lượng'])||0),
        });
      });

      const newInvoices = hdRows.filter(r=>r['Mã HD']).map(r=>{
        const code = String(r['Mã HD']).trim();
        const items = itemsByCode[code] || [];
        let ts = Number(r['Timestamp']);
        if(!ts || isNaN(ts)){
          const parsed = Date.parse(r['Ngày']);
          ts = isNaN(parsed) ? Date.now() : parsed;
        }
        const total = items.reduce((s,it)=>s+it.subtotal,0);
        return {
          id: String(r['ID']||'').trim() || uid(),
          code,
          date: ts,
          customerId: String(r['ID Khách hàng']||'').trim() || null,
          items,
          total: total || Number(r['Tổng tiền'])||0,
        };
      });

      PRODUCTS = newProducts;
      CUSTOMERS = newCustomers;
      INVOICES = newInvoices;
      await saveProducts();
      await saveCustomers();
      await saveInvoices();

      toast(`Đã khôi phục: ${PRODUCTS.length} sản phẩm, ${CUSTOMERS.length} khách hàng, ${INVOICES.length} hóa đơn`);
      cart = [];
      if(activeTab==='backup') renderBackup(document.getElementById('main'));
      else render();
    }catch(err){
      console.error(err);
      toast('Lỗi khi đọc file Excel');
      if(status) status.textContent = 'Không đọc được file. Kiểm tra lại định dạng.';
    }
  };
  reader.readAsArrayBuffer(file);
}

/* ---------------- IMPORT PURCHASE INVOICE (PDF) ---------------- */
let importState = { step: 'upload', items: [], fileName: '', busy: false };
const UNIT_WORDS = ['cái','chiếc','kg','g','gói','hộp','lon','chai','thùng','bộ','cuốn','đôi','cặp','túi','lốc','thanh','ly','phần','ổ','m','cm','lít','l','bao','viên','vỉ','quyển','tấm'];
const UNIT_WORDS_NORM = new Set(UNIT_WORDS.map(normalizeVN));

function normalizeVN(s){
  return (s||'').toString().toLowerCase().replace(/đ/g,'d')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
}
function parseVNNumber(s){
  const clean = (s||'').replace(/\s/g,'').replace(/[.,]/g,'');
  return Number(clean)||0;
}
function findBestMatch(name){
  const n = normalizeVN(name);
  if(!n) return null;
  let best = null, bestScore = 0;
  PRODUCTS.forEach(p=>{
    const pn = normalizeVN(p.name);
    let score = 0;
    if(pn===n) score = 1;
    else if(pn.includes(n) || n.includes(pn)) score = 0.85;
    else {
      const a = new Set(n.split(' ').filter(Boolean));
      const b = new Set(pn.split(' ').filter(Boolean));
      const inter = [...a].filter(x=>b.has(x)).length;
      const union = new Set([...a,...b]).size;
      score = union ? inter/union : 0;
    }
    if(score > bestScore){ bestScore = score; best = p; }
  });
  return best ? { product: best, score: bestScore } : null;
}

async function extractPdfLines(file){
  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buf }).promise;
  const lines = [];
  const Y_TOLERANCE = 3; // points — items within this vertical distance are treated as the same table row
  for(let p=1; p<=pdf.numPages; p++){
    const page = await pdf.getPage(p);
    const content = await page.getTextContent();
    const glyphs = content.items
      .map(it=>({ x: it.transform[4], y: it.transform[5], str: it.str }))
      .filter(g=>g.str && g.str.trim()!=='')
      .sort((a,b)=> b.y-a.y || a.x-b.x);
    let cluster = [];
    let clusterY = null;
    const flush = ()=>{
      if(cluster.length){
        const line = cluster.sort((a,b)=>a.x-b.x).map(g=>g.str).join(' ').replace(/\s+/g,' ').trim();
        if(line) lines.push(line);
      }
      cluster = []; clusterY = null;
    };
    glyphs.forEach(g=>{
      if(clusterY===null || Math.abs(g.y-clusterY) <= Y_TOLERANCE){
        cluster.push(g);
        // keep the cluster's reference y as the running average for stability
        clusterY = clusterY===null ? g.y : (clusterY*(cluster.length-1)+g.y)/cluster.length;
      }else{
        flush();
        cluster.push(g);
        clusterY = g.y;
      }
    });
    flush();
  }
  return lines;
}
function parseLineToItem(line){
  const numRe = /\d{1,3}(?:[.,]\d{3})*(?:[.,]\d+)?/g;
  const matches = [...line.matchAll(numRe)];
  if(matches.length < 3) return null;
  const last3 = matches.slice(-3);
  const qty = parseVNNumber(last3[0][0]);
  const price = parseVNNumber(last3[1][0]);
  const amount = parseVNNumber(last3[2][0]);
  if(qty<=0 || price<=0) return null;
  const expected = qty*price;
  if(expected>0 && Math.abs(expected-amount)/expected > 0.08) return null;
  let namePart = line.slice(0, last3[0].index).trim();
  // strip a leading STT (numbering) column, e.g. "12." / "12)" / "12 "
  namePart = namePart.replace(/^\d{1,3}[\.\)]?\s+/, '').trim();
  const parts = namePart.split(' ');
  let unit = '';
  const lastWord = normalizeVN(parts[parts.length-1]||'');
  if(UNIT_WORDS_NORM.has(lastWord)){
    const candidateName = parts.slice(0,-1).join(' ').trim();
    // only treat as a unit column if there's still a substantial name left —
    // otherwise this word is very likely part of the product name itself
    if(candidateName.replace(/[^a-zA-ZÀ-ỹ]/g,'').length >= 3){
      unit = parts.pop();
      namePart = candidateName;
    }
  }
  if(!namePart || namePart.replace(/[^a-zA-ZÀ-ỹ]/g,'').length < 2) return null;
  return { name: namePart, unit, qty, price, amount: amount||expected };
}

/* Merge PDF lines that are really a wrapped continuation of the product name
   above them (common when the name column wraps to 2 lines) into the item
   line that carries the qty/price/amount columns — this is the #1 cause of
   product names getting cut off. */
const INVOICE_STOP_WORDS_RE = /tong|cong|thue|ky hieu|so hoa don|nguoi ban|nguoi mua|ma so thue|dia chi|hinh thuc|^stt$|ten hang|don vi tinh|so luong|don gia|thanh tien|ghi chu|cong hoa|doc lap|hoa don gia tri|website|dien thoai|fax|email/;
function parseInvoiceLines(lines){
  const items = [];
  let pending = [];
  for(const raw of lines){
    const it = parseLineToItem(raw);
    if(it){
      if(pending.length){
        it.name = (pending.join(' ') + ' ' + it.name).replace(/\s+/g,' ').trim();
        pending = [];
      }
      items.push(it);
    }else{
      const trimmed = raw.trim();
      const norm = normalizeVN(trimmed);
      if(trimmed && trimmed.length < 60 && pending.length < 2 && !INVOICE_STOP_WORDS_RE.test(norm)){
        pending.push(trimmed);
      }else{
        pending = []; // hit a header/footer/section line — don't merge across it
      }
    }
  }
  return items;
}

function renderImportPdf(main){
  main.innerHTML = `
    <div class="page-head"><div class="page-title">Nhập hàng từ hóa đơn PDF</div></div>
    <div class="step-badges">
      <div class="step-badge ${importState.step==='upload'?'active':(importState.step!=='upload'?'done':'')}">1. Tải hóa đơn</div>
      <div class="step-badge ${importState.step==='edit'?'active':(['review','done'].includes(importState.step)?'done':'')}">2. Kiểm tra dữ liệu</div>
      <div class="step-badge ${importState.step==='review'?'active':(importState.step==='done'?'done':'')}">3. Xử lý trùng lặp</div>
      <div class="step-badge ${importState.step==='done'?'active':''}">4. Hoàn tất</div>
    </div>
    <div id="importBody"></div>
  `;
  const body = document.getElementById('importBody');
  if(importState.step==='upload') renderImportUpload(body);
  else if(importState.step==='edit') renderImportEdit(body);
  else if(importState.step==='review') renderImportReview(body);
  else if(importState.step==='done') renderImportDone(body);
}

function renderImportUpload(body){
  body.innerHTML = `
    <div class="disclaimer">Ứng dụng sẽ tự động đọc bảng sản phẩm trong file PDF. Vì hóa đơn điện tử có nhiều mẫu khác nhau, bạn nên kiểm tra lại dữ liệu ở bước tiếp theo trước khi nhập vào kho.</div>
    <div class="dropzone" id="dropzone">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin:0 auto;display:block;"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg>
      <div class="dropzone-title">${importState.busy?'Đang đọc file PDF...':'Bấm để chọn file hóa đơn PDF'}</div>
      <div class="dropzone-sub">Hỗ trợ hóa đơn điện tử dạng PDF có bảng sản phẩm</div>
    </div>
    <input type="file" id="pdfFile" accept="application/pdf" style="display:none;">
  `;
  const dz = document.getElementById('dropzone');
  const input = document.getElementById('pdfFile');
  dz.addEventListener('click', ()=>{ if(!importState.busy) input.click(); });
  input.addEventListener('change', e=>{ const f=e.target.files[0]; if(f) handlePdfUpload(f); });
}
async function handlePdfUpload(file){
  importState.busy = true;
  importState.fileName = file.name;
  renderImportPdf(document.getElementById('main'));
  try{
    const lines = await extractPdfLines(file);
    const items = parseInvoiceLines(lines);
    items.forEach(it=>{ if(!it.unit) it.unit = guessUnitForName(it.name) || DEFAULT_UNIT; });
    importState.items = items;
    importState.busy = false;
    if(items.length===0){
      toast('Không tự động nhận diện được dòng sản phẩm nào — bạn có thể thêm thủ công');
    }else{
      toast(`Đã nhận diện ${items.length} dòng sản phẩm`);
    }
    importState.step = 'edit';
    renderImportPdf(document.getElementById('main'));
  }catch(err){
    console.error(err);
    importState.busy = false;
    toast('Không đọc được file PDF này' + (err && err.message ? (': ' + err.message) : ''));
    renderImportPdf(document.getElementById('main'));
  }
}

function renderImportEdit(body){
  body.innerHTML = `
    <div class="panel">
      <div class="panel-head">
        <div class="panel-title">Dữ liệu trích xuất từ: ${escapeHtml(importState.fileName||'file PDF')}</div>
        <button class="btn btn-ghost btn-sm" id="addRowBtn">+ Thêm dòng</button>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Tên hàng</th><th style="width:70px">Đơn vị</th><th style="width:80px;text-align:right">SL</th><th style="width:120px;text-align:right">Đơn giá</th><th style="width:130px;text-align:right">Thành tiền</th><th></th></tr></thead>
          <tbody id="stageBody"></tbody>
        </table>
        ${importState.items.length===0?'<div class="empty-state">Chưa có dòng nào. Bấm "+ Thêm dòng" để nhập thủ công.</div>':''}
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:16px;">
      <button class="btn btn-ghost" id="backBtn">← Tải file khác</button>
      <button class="btn btn-primary" id="nextBtn">Tiếp theo: Kiểm tra trùng lặp →</button>
    </div>
  `;
  fillStageBody();
  document.getElementById('addRowBtn').addEventListener('click', ()=>{
    importState.items.push({name:'', unit:DEFAULT_UNIT, qty:1, price:0, amount:0});
    fillStageBody();
  });
  document.getElementById('backBtn').addEventListener('click', ()=>{ importState = {step:'upload', items:[], fileName:'', busy:false}; renderImportPdf(document.getElementById('main')); });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    importState.items = importState.items.filter(it=>it.name && it.name.trim() && it.qty>0);
    if(importState.items.length===0){ toast('Chưa có dòng sản phẩm hợp lệ nào'); return; }
    importState.step = 'review';
    renderImportPdf(document.getElementById('main'));
  });
}
function fillStageBody(){
  const tb = document.getElementById('stageBody');
  if(!tb) return;
  tb.innerHTML = importState.items.map((it,idx)=>`
    <tr>
      <td><input class="stage-input" data-i="${idx}" data-f="name" value="${escapeHtml(it.name)}" placeholder="Tên sản phẩm"></td>
      <td><input class="stage-input" data-i="${idx}" data-f="unit" value="${escapeHtml(it.unit||'')}" placeholder="cái"></td>
      <td><input class="stage-input mono" data-i="${idx}" data-f="qty" type="number" value="${it.qty}" style="text-align:right"></td>
      <td><input class="stage-input mono" data-i="${idx}" data-f="price" type="number" value="${it.price}" style="text-align:right"></td>
      <td class="num mono">${fmt(it.qty*it.price)}</td>
      <td><button class="icon-btn" data-rm="${idx}" title="Xóa dòng">✕</button></td>
    </tr>`).join('');
  tb.querySelectorAll('input').forEach(inp=>{
    inp.addEventListener('input', e=>{
      const idx = Number(e.target.dataset.i), f = e.target.dataset.f;
      importState.items[idx][f] = (f==='qty'||f==='price') ? Number(e.target.value)||0 : e.target.value;
      if(f==='qty'||f==='price'){
        const row = e.target.closest('tr');
        row.querySelector('.num').textContent = fmt(importState.items[idx].qty*importState.items[idx].price);
      }
    });
  });
  tb.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click', ()=>{
    importState.items.splice(Number(b.dataset.rm),1);
    fillStageBody();
  }));
}

function renderImportReview(body){
  const rows = importState.items.map((it,idx)=>{
    const match = findBestMatch(it.name);
    if(match && it.__decision===undefined) it.__decision = match.score>=0.6 ? match.product.id : '';
    const sorted = [...PRODUCTS].map(p=>({p, score: (findBestMatch(it.name) && normalizeVN(p.name)===normalizeVN(it.name)) ? 1 : (match && match.product.id===p.id ? match.score : (()=>{
        const n=normalizeVN(it.name), pn=normalizeVN(p.name);
        if(pn.includes(n)||n.includes(pn)) return 0.85;
        const a=new Set(n.split(' ')), b=new Set(pn.split(' '));
        const inter=[...a].filter(x=>b.has(x)).length, union=new Set([...a,...b]).size;
        return union?inter/union:0;
      })()) })).sort((a,b)=>b.score-a.score);
    const options = sorted.map(({p,score})=>{
      const badge = score>=0.6 ? `khớp ${Math.round(score*100)}%` : (score>=0.3?`gần giống ${Math.round(score*100)}%`:'');
      return `<option value="${p.id}" ${it.__decision===p.id?'selected':''}>${escapeHtml(p.name)} (tồn: ${p.stock})${badge?' — '+badge:''}</option>`;
    }).join('');
    return `
      <tr>
        <td>
          <div style="font-weight:600;">${escapeHtml(it.name)}</div>
          <div style="font-size:11.5px;color:var(--ink-soft);">${it.qty} ${escapeHtml(it.unit||'')} × ${fmt(it.price)}</div>
        </td>
        <td style="min-width:260px;">
          <select data-idx="${idx}" class="decision-select">
            <option value="" ${!it.__decision?'selected':''}>— Tạo sản phẩm mới —</option>
            ${options}
          </select>
        </td>
      </tr>`;
  }).join('');

  body.innerHTML = `
    <div class="panel">
      <div class="panel-head"><div class="panel-title">Kiểm tra sản phẩm trùng lặp</div></div>
      <div class="panel-body">
        <p style="font-size:12.5px;color:var(--ink-soft);margin-top:0;">Với mỗi mặt hàng: chọn sản phẩm đã có để <b>cộng dồn tồn kho</b>, hoặc để "Tạo sản phẩm mới" nếu đây là mặt hàng chưa từng có.</p>
        <table><thead><tr><th>Mặt hàng trong hóa đơn</th><th>Xử lý</th></tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>
    <div style="display:flex;justify-content:space-between;margin-top:16px;">
      <button class="btn btn-ghost" id="backBtn2">← Sửa dữ liệu</button>
      <button class="btn btn-primary" id="applyBtn">Xác nhận nhập kho</button>
    </div>
  `;
  body.querySelectorAll('.decision-select').forEach(sel=>{
    sel.addEventListener('change', e=>{
      importState.items[Number(e.target.dataset.idx)].__decision = e.target.value;
    });
  });
  document.getElementById('backBtn2').addEventListener('click', ()=>{ importState.step='edit'; renderImportPdf(document.getElementById('main')); });
  document.getElementById('applyBtn').addEventListener('click', applyImport);
}

async function applyImport(){
  let mergedCount = 0, createdCount = 0;
  importState.items.forEach(it=>{
    if(it.__decision){
      const p = PRODUCTS.find(x=>x.id===it.__decision);
      if(p){
        p.stock = (p.stock||0) + it.qty;
        p.cost = it.price;
        if(!p.unit && it.unit) p.unit = it.unit; // backfill unit if it wasn't set before
        mergedCount++;
      }
    }else{
      PRODUCTS.push({ id: uid(), name: it.name, sku: generateSKU(), category:'', price: it.price, cost: it.price, stock: it.qty, unit: it.unit || DEFAULT_UNIT });
      createdCount++;
    }
  });
  await saveProducts();
  importState.step = 'done';
  importState.__summary = { mergedCount, createdCount };
  renderImportPdf(document.getElementById('main'));
}
function renderImportDone(body){
  const s = importState.__summary || {mergedCount:0, createdCount:0};
  body.innerHTML = `
    <div class="panel">
      <div class="panel-body" style="text-align:center;padding:40px 20px;">
        <div style="font-size:32px;margin-bottom:10px;">✅</div>
        <div style="font-family:'Be Vietnam Pro',sans-serif;font-weight:700;font-size:16px;margin-bottom:6px;">Đã cập nhật kho hàng</div>
        <div style="font-size:13px;color:var(--ink-soft);">Cộng dồn ${s.mergedCount} sản phẩm có sẵn · Tạo mới ${s.createdCount} sản phẩm</div>
        <div style="display:flex;gap:8px;justify-content:center;margin-top:20px;">
          <button class="btn btn-ghost" id="viewProdBtn">Xem sản phẩm</button>
          <button class="btn btn-primary" id="newImportBtn">Nhập hóa đơn khác</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('viewProdBtn').addEventListener('click', ()=>{
    document.querySelectorAll('.nav-item').forEach(b=>b.classList.toggle('active', b.dataset.tab==='products'));
    activeTab='products'; render();
  });
  document.getElementById('newImportBtn').addEventListener('click', ()=>{
    importState = {step:'upload', items:[], fileName:'', busy:false};
    renderImportPdf(document.getElementById('main'));
  });
}

/* ---------------- INIT ---------------- */
async function resolveWorkerSrc(){
  const LOCAL = 'lib/pdf.worker.min.js';
  const CDN = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  // Opened as a local file (file://): trust the local path — the user was guided to place it there for offline use.
  if(location.protocol === 'file:') return LOCAL;
  // Hosted online (http/https): check if lib/pdf.worker.min.js was actually uploaded (same-origin, safe to use directly).
  try{
    const res = await fetch(LOCAL, { method:'HEAD' });
    if(res.ok) return LOCAL;
  }catch(e){ /* fall through */ }
  // Not uploaded locally — fetch the CDN worker script's actual code and load it from a same-origin
  // blob: URL instead. Browsers block creating a Worker directly from a cross-origin script URL,
  // so pointing workerSrc straight at the CDN link fails silently with a security error.
  try{
    const res = await fetch(CDN);
    if(res.ok){
      const code = await res.text();
      const blob = new Blob([code], { type: 'application/javascript' });
      return URL.createObjectURL(blob);
    }
  }catch(e){ console.error('Không tải được worker PDF từ CDN', e); }
  return CDN; // last resort
}
(async function init(){
  if(typeof pdfjsLib !== 'undefined'){
    pdfjsLib.GlobalWorkerOptions.workerSrc = await resolveWorkerSrc();
  }
  await loadAll();
  seedIfEmpty();
  await tryResumeLinkedFile(); // if a fixed local database file was linked before and permission still granted, its data takes precedence
  LOADED = true;
  render();
})();
</script>
